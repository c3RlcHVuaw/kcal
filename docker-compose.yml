x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    build: .
    command: ["./scripts/entrypoint.sh", "api"]
    env_file: .env
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3100}:3100"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3100/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  bot:
    build: .
    command: ["./scripts/entrypoint.sh", "bot"]
    env_file: .env
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  admin-bot:
    build: .
    command: ["./scripts/entrypoint.sh", "admin-bot"]
    env_file: .env
    logging: *default-logging
    volumes:
      - ./backups:/app/backups:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    logging: *default-logging
    environment:
      POSTGRES_DB: kcal
      POSTGRES_USER: kcal
      POSTGRES_PASSWORD: kcal
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kcal -d kcal"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    logging: *default-logging
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
