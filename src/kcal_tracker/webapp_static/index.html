<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Kcal</title>
    <link rel="stylesheet" href="/app/static/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="hero-top">
          <div>
            <p id="hello" class="subtle">Kcal Tracker</p>
            <h1>Сегодня</h1>
          </div>
          <button id="refresh" class="ghost-button" type="button" aria-label="Обновить">↻</button>
        </div>

        <div class="kcal-row">
          <div>
            <strong id="kcal-left">Загрузка...</strong>
            <span id="kcal-target">0 / 0 ккал</span>
          </div>
          <b id="kcal-percent">0%</b>
        </div>
        <div class="progress-track">
          <span id="kcal-progress"></span>
        </div>
      </header>

      <section id="auth-warning" class="notice hidden">
        Открой приложение из Telegram, чтобы дневник подключился к твоему профилю.
      </section>

      <section class="macro-strip" aria-label="БЖУ">
        <article>
          <span>Белки</span>
          <b id="protein">0/0</b>
        </article>
        <article>
          <span>Жиры</span>
          <b id="fat">0/0</b>
        </article>
        <article>
          <span>Углеводы</span>
          <b id="carbs">0/0</b>
        </article>
      </section>

      <section class="quick-actions">
        <button type="button" data-water="250">
          <span>Вода</span>
          <b>+250 мл</b>
        </button>
        <button type="button" data-water="500">
          <span>Вода</span>
          <b>+500 мл</b>
        </button>
        <button id="weight-button" type="button">
          <span>Вес</span>
          <b id="weight-value">Записать</b>
        </button>
      </section>

      <section class="feed-section">
        <div class="section-title">
          <h2>Дневник</h2>
          <span id="water">0 мл воды</span>
        </div>
        <div id="entries" class="entries"></div>
      </section>

      <section class="goal-card">
        <span>Цель веса</span>
        <p id="weight-goal">Загрузка...</p>
      </section>
    </main>

    <button id="open-add" class="fab" type="button">+ Еда</button>

    <div id="add-sheet" class="sheet hidden" aria-hidden="true">
      <button id="sheet-backdrop" class="sheet-backdrop" type="button" aria-label="Закрыть"></button>
      <section class="sheet-panel">
        <div class="sheet-handle"></div>
        <div class="section-title">
          <h2>Добавить еду</h2>
          <button id="close-add" class="text-button" type="button">Готово</button>
        </div>
        <form id="food-form" class="food-form">
          <input id="food-name" name="name" autocomplete="off" placeholder="Название" required />
          <div class="field-row">
            <input id="food-kcal" name="kcal" inputmode="decimal" placeholder="ккал" required />
            <input id="food-weight" name="weight" inputmode="decimal" placeholder="граммы" />
          </div>
          <div class="field-row three">
            <input id="food-protein" name="protein" inputmode="decimal" placeholder="белки" />
            <input id="food-fat" name="fat" inputmode="decimal" placeholder="жиры" />
            <input id="food-carbs" name="carbs" inputmode="decimal" placeholder="углеводы" />
          </div>
          <button class="primary-button" type="submit">Добавить в дневник</button>
        </form>
      </section>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="/app/static/app.js" type="module"></script>
  </body>
</html>
