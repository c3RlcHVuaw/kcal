name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kcal
          POSTGRES_USER: kcal
          POSTGRES_PASSWORD: kcal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kcal -d kcal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://kcal:kcal@127.0.0.1:5432/kcal
      REDIS_URL: redis://127.0.0.1:6379/0
      TELEGRAM_BOT_TOKEN: test-token
      ADMIN_BOT_TOKEN: test-admin-token
      ADMIN_TELEGRAM_IDS: "123456"
      OPENAI_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libzbar0
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
      - name: Prepare compose env
        run: cp .env.example .env
      - name: Validate
        run: ./scripts/validate.sh
      - name: Production settings preflight
        env:
          APP_ENV: production
          PUBLIC_API_URL: https://kcal.example.com
        run: python -c "from kcal_tracker.config import validate_production_settings; validate_production_settings()"
